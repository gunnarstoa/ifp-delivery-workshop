{% extends "base.html" %}
{% block title %}Sign in — IFP Delivery Partner Workshop{% endblock %}
{% block body %}
<div class="auth-shell">
  <div class="auth-card">
    <h1>IFP Delivery Partner Workshop</h1>
    <div class="subtitle">Sign in with the username and password your facilitator sent you.</div>
    {% if error %}<div class="auth-error">{{ error }}</div>{% endif %}
    <form method="post" action="{{ url_for('login') }}{% if next %}?next={{ next }}{% endif %}" autocomplete="on">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" required autocomplete="username" autofocus>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required autocomplete="current-password">
      <button type="submit">Sign in</button>
    </form>
  </div>
</div>
{% endblock %}
